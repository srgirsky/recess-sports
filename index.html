<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Recess Sports</title>
    <style>
      /* Self-hosted Fredoka (SIL OFL) — rounded, friendly, on-brand. Variable weight. */
      @font-face {
        font-family: 'Fredoka';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url('./fonts/fredoka.woff2') format('woff2');
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0d1b2a;
        overflow: hidden;
        /* Kill double-tap-zoom / long-press select so taps register as swings on tablets */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      #game canvas {
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
