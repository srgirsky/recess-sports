name: Deploy to GitHub Pages

# Build the static site and publish it on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy by hand from the Actions tab

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer push cancels an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
